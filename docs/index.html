<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Polished Recognition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    <style>
        :root {
            --pico-font-family: system-ui, -apple-system, sans-serif;
        }
        header {
            padding-block: 2rem;
        }
        nav a[aria-current="page"] {
            font-weight: 600;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<header>
    <h1>Polished Recognition</h1>
    <p>Voice input for any Android keyboard. Transcribe, clean up, and translate audio using your own OpenAI-compatible STT and LLM endpoints — no account, no central server, no vendor lock-in.</p>
</header>

<nav>
    <a href="#" data-page="README.md" aria-current="page">About</a>
    <a href="#" data-page="INSTALLATION.md">Installation</a>
    <a href="#" data-page="PRIVACY-POLICY.md">Privacy</a>
</nav>

<main id="content">
    <p>Loading…</p>
</main>

<footer>
    <small>
        <a href="privacy-policy">Privacy Policy</a>
        &middot;
        <a href="https://github.com/georgernstgraf/polished-recognition">GitHub</a>
        &middot;
        <a href="https://play.google.com/store/apps/details?id=com.georgernstgraf.polishedrecognition">Play Store</a>
    </small>
</footer>

<script>
function loadPage(file, el) {
    document.querySelectorAll('nav a').forEach(function(a) { a.removeAttribute('aria-current'); });
    if (el) el.setAttribute('aria-current', 'page');
    fetch('https://raw.githubusercontent.com/georgernstgraf/polished-recognition/master/' + file)
        .then(function(r) { return r.text(); })
        .then(function(md) { document.getElementById('content').innerHTML = marked.parse(md); })
        .catch(function() {
            document.getElementById('content').innerHTML =
                '<p>Could not load. View it on <a href="https://github.com/georgernstgraf/polished-recognition/blob/master/' + file + '">GitHub</a>.</p>';
        });
}

document.querySelectorAll('nav a').forEach(function(a) {
    a.addEventListener('click', function(e) { e.preventDefault(); loadPage(a.dataset.page, a); });
});

loadPage('README.md', document.querySelector('nav a[data-page="README.md"]'));
</script>
</body>
</html>
