<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Privacy Policy — Polished Recognition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    <style>
        :root {
            --pico-font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<main id="content"><p>Loading…</p></main>
<script>
fetch('https://raw.githubusercontent.com/georgernstgraf/polished-recognition/master/PRIVACY-POLICY.md')
    .then(function(r) { return r.text(); })
    .then(function(md) { document.getElementById('content').innerHTML = marked.parse(md); })
    .catch(function() { document.getElementById('content').innerHTML = '<p>Could not load.</p>'; });
</script>
</body>
</html>
