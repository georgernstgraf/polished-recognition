<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient (Deep Forest to Vibrant Leaf) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#113619" />
      <stop offset="50%" stop-color="#1B5E20" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>

    <!-- Polished Chrome/Silver Gradient -->
    <linearGradient id="chrome-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#ECEFF1" />
      <stop offset="50%" stop-color="#B0BEC5" />
      <stop offset="75%" stop-color="#90A4AE" />
      <stop offset="100%" stop-color="#607D8B" />
    </linearGradient>

    <!-- Glowing Gold Gradient for Sparkles -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF59D" />
      <stop offset="35%" stop-color="#FFD54F" />
      <stop offset="75%" stop-color="#FF8F00" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>

    <!-- Fine Metallic Grille Mesh Pattern -->
    <pattern id="grille-mesh" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#1C1C1C" />
      <!-- Horizontal mesh lines -->
      <path d="M 0,0 L 8,0" stroke="#37474F" stroke-width="0.8" />
      <!-- Vertical mesh lines -->
      <path d="M 0,0 L 0,8" stroke="#37474F" stroke-width="0.8" />
    </pattern>

    <!-- Unified Soft Drop Shadow for Microphone -->
    <filter id="mic-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#041508" flood-opacity="0.65" />
    </filter>

    <!-- Magical Gold Outer Glow for Gemini Sparkles -->
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FFCA28" flood-opacity="0.85" />
    </filter>
  </defs>

  <!-- Rich Gradient Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" />

  <!-- MICROPHONE ASSEMBLY (Casts single unified shadow) -->
  <g filter="url(#mic-shadow)">
    <!-- Stand Base (Chrome Ellipse) -->
    <ellipse cx="256" cy="430" rx="90" ry="18" fill="url(#chrome-grad)" />
    <!-- Inner Base Rim -->
    <ellipse cx="256" cy="427" rx="84" ry="14" fill="#37474F" opacity="0.35" />

    <!-- Vertical Stem -->
    <rect x="246" y="340" width="20" height="80" rx="4" fill="url(#chrome-grad)" />
    <!-- Bracket Connector Pin -->
    <rect x="248" y="325" width="16" height="25" rx="2" fill="url(#chrome-grad)" />

    <!-- U-Cradle Bracket -->
    <path d="M156,230 v50 A100,100 0 0,0 356,280 v-50" fill="none" stroke="url(#chrome-grad)" stroke-width="18" stroke-linecap="round" />

    <!-- Cylinder Mic Body -->
    <rect x="206" y="250" width="100" height="85" rx="12" fill="url(#chrome-grad)" />
    <!-- Accent Line on Body -->
    <rect x="206" y="272" width="100" height="8" fill="#1C3122" opacity="0.15" />

    <!-- Capsule Head Clip (For Grille) -->
    <clipPath id="capsule-clip">
      <path d="M206,245 v-85 a50,50 0 0,1 100,0 v85 z" />
    </clipPath>

    <!-- Dark Capsule Base -->
    <path d="M206,245 v-85 a50,50 0 0,1 100,0 v85 z" fill="#1C1C1C" />
    <!-- Mesh Grid overlay -->
    <path d="M206,245 v-85 a50,50 0 0,1 100,0 v85 z" fill="url(#grille-mesh)" clip-path="url(#capsule-clip)" />

    <!-- Silver Capsule Frame Arch -->
    <path d="M206,245 v-85 a50,50 0 0,1 100,0 v85" fill="none" stroke="url(#chrome-grad)" stroke-width="6" />

    <!-- Collar Band (separating body and capsule) -->
    <rect x="202" y="242" width="108" height="12" rx="4" fill="url(#chrome-grad)" />
  </g>

  <!-- GEMINI AI SPARKLES (With radiant gold glow) -->
  <g filter="url(#gold-glow)">
    <!-- Primary Sparkle (Upper-Right) -->
    <path fill="url(#gold-grad)" d="M 380,65 C 380,105 385,125 435,130 C 385,135 380,155 380,195 C 380,155 375,135 325,130 C 375,125 380,105 380,65 Z" />

    <!-- Secondary Companion Sparkle (Lower-Right) -->
    <path fill="url(#gold-grad)" d="M 430,175 C 430,190 432,198 455,200 C 432,202 430,210 430,225 C 430,210 428,202 405,200 C 428,198 430,190 430,175 Z" />
  </g>
</svg>
