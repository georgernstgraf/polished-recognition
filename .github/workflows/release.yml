name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/upload.keystore

    - name: Build Release AAB
      run: |
        ./gradlew bundleRelease --no-daemon \
          -Pandroid.injected.signing.store.file=$RUNNER_TEMP/upload.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    - name: Cleanup keystore
      if: always()
      run: rm -f $RUNNER_TEMP/upload.keystore

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/bundle/release/app-release.aab
        generate_release_notes: true

    - name: Upload to Play Console
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.georgernstgraf.polishedrecognition
        releaseFiles: app/build/outputs/bundle/release/app-release.aab
        track: alpha
        status: completed
        whatsNewDirectory: distribution/whatsnew
      continue-on-error: true

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 90

    - name: Cleanup old build releases (keep newest 7)
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tags=$(gh release list --limit 100 --json tagName,createdAt \
          --jq 'sort_by(.createdAt) | reverse | .[].tagName' | grep '^build-' | tail -n +8)
        for tag in $tags; do
          echo "Deleting build release: $tag"
          gh release delete "$tag" --yes 2>/dev/null || true
          gh api --method DELETE repos/${{ github.repository }}/git/refs/tags/"$tag" \
            2>/dev/null || true
        done
