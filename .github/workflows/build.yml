name: Build Release APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Ensure debug keystore
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" \
              -storepass android -keypass android
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=androiddebugkey \
          -Pandroid.injected.signing.key.password=android

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Publish release APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: build-${{ github.run_number }}
          make_latest: true
          fail_on_unmatched_files: true
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            Automated build #${{ github.run_number }} from commit ${{ github.sha }}.
            Download the APK and install via ADB.

      - name: Cleanup old releases (keep newest 7)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tags=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName' | tail -n +8)
          for tag in $tags; do
            echo "Deleting release: $tag"
            gh release delete "$tag" --yes 2>/dev/null || true
            gh api --method DELETE repos/${{ github.repository }}/git/refs/tags/"$tag" \
              2>/dev/null || true
          done
