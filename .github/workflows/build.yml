name: Build Release APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Setup release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release.keystore

      - name: Build release APK & AAB
        run: |
          ./gradlew assembleRelease
          ./gradlew bundleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Publish release APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: build-${{ github.run_number }}
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          body: |
            Automated build #${{ github.run_number }} from commit ${{ github.sha }}.
            Download the APK and install via ADB.

      - name: Cleanup old releases (keep newest 7)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tags=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName' | tail -n +8)
          for tag in $tags; do
            echo "Deleting release: $tag"
            gh release delete "$tag" --yes 2>/dev/null || true
            gh api --method DELETE repos/${{ github.repository }}/git/refs/tags/"$tag" \
              2>/dev/null || true
          done
